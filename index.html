<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바다 속 상어 피하기 게임</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0e1e38;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #1cb5e0, #000046);
        }
        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ff4757;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #gameOverScreen p {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #restartBtn:hover {
            background-color: #26af5f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>최종 점수: <span id="finalScore">0</span></p>
        <button id="restartBtn" onclick="resetGame()">다시 시작</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScore');

    // 이미지 로드
    const fishSprite = new Image();
    fishSprite.src = 'fish_sprite.png'; // 같은 폴더에 위치해야 합니다.

    // 게임 상태 변수
    let gameActive = true;
    let score = 0;
    let gameSpeedMultiplier = 1;

    // 스프라이트 시트 정보 (2x2 그리드 형태)
    // 전체 이미지 크기 기준 등분할 처리
    const spriteCols = 2;
    const spriteRows = 2;
    
    // 플레이어 (물고기) 설정
    const player = {
        x: 100,
        y: 250,
        width: 64,  // 화면에 그려질 크기
        height: 64,
        speed: 5,
        facingLeft: false,
        frameX: 0,
        frameY: 0,
        animTimer: 0
    };

    // 상어 (장애물) 배열
    let sharks = [];
    let spawnTimer = 0;

    // 키보드 입력 처리
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    // 상어 스폰 함수
    function spawnShark() {
        const size = Math.random() * (70 - 40) + 40; // 무작위 크기
        const y = Math.random() * (canvas.height - size - 20) + 10;
        const speed = (Math.random() * (4 - 2) + 2) * gameSpeedMultiplier;
        
        sharks.push({
            x: canvas.width + 50,
            y: y,
            width: size * 1.5, // 조금 길쭉하게
            height: size,
            speed: speed,
            color: '#747d8c'
        });
    }

    // 충돌 검사 알고리즘
    function checkCollision(rect1, rect2) {
        // 좀 더 너그러운 판정을 위해 히트박스 축소
        const padding1 = rect1.width * 0.15;
        const padding2 = rect2.width * 0.15;

        return rect1.x + padding1 < rect2.x + rect2.width - padding2 &&
               rect1.x + rect1.width - padding1 > rect2.x + padding2 &&
               rect1.y + padding1 < rect2.y + rect2.height - padding2 &&
               rect1.y + rect1.height - padding1 > rect2.y + padding2;
    }

    // 게임 리셋
    function resetGame() {
        sharks = [];
        score = 0;
        gameSpeedMultiplier = 1;
        player.x = 100;
        player.y = 250;
        gameActive = true;
        gameOverScreen.style.display = 'none';
        animate();
    }

    // 메인 게임 루프
    function animate() {
        if (!gameActive) return;

        // 1. 화면 지우기
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 배경 연출 (간단한 파도선/기포 표현 가능)
        score += 1;
        if (score % 500 === 0) gameSpeedMultiplier += 0.2; // 갈수록 빨라짐

        // 2. 플레이어 이동 및 경계 제한
        let isMoving = false;
        if (keys['ArrowUp'] && player.y > 0) { player.y -= player.speed; isMoving = true; }
        if (keys['ArrowDown'] && player.y < canvas.height - player.height) { player.y += player.speed; isMoving = true; }
        if (keys['ArrowLeft'] && player.x > 0) { player.x -= player.speed; player.facingLeft = true; isMoving = true; }
        if (keys['ArrowRight'] && player.x < canvas.width - player.width) { player.x += player.speed; player.facingLeft = false; isMoving = true; }

        // 3. 스프라이트 애니메이션 제어
        player.animTimer++;
        if (isMoving) {
            // 움직일 때: 거품 무는 모습과 입벌린 모습 교차 (우상단[1,0], 좌하단[0,1])
            if (player.animTimer % 20 < 10) {
                player.frameX = 1; player.frameY = 0; // 거품
            } else {
                player.frameX = 0; player.frameY = 1; // 일반 미소
            }
        } else {
            // 가만히 있을 때: 기본 상태와 입벌린 상태 교차 (좌상단[0,0], 우하단[1,1])
            if (player.animTimer % 40 < 20) {
                player.frameX = 0; player.frameY = 0;
            } else {
                player.frameX = 1; player.frameY = 1;
            }
        }

        // 4. 플레이어 그리기 (좌우 반전 처리 포함)
        ctx.save();
        
        // 원본 스프라이트 크기 계산 (이미지가 다 준비되었을 때 계산)
        const sw = fishSprite.width / spriteCols;
        const sh = fishSprite.height / spriteRows;
        const sx = player.frameX * sw;
        const sy = player.frameY * sh;

        if (player.facingLeft) {
            // 왼쪽을 바라볼 때 캔버스를 좌우 반전
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            ctx.scale(-1, 1);
            ctx.drawImage(fishSprite, sx, sy, sw, sh, -player.width / 2, -player.height / 2, player.width, player.height);
        } else {
            // 오른쪽을 바라볼 때 일반 축으로 그리기
            ctx.drawImage(fishSprite, sx, sy, sw, sh, player.x, player.y, player.width, player.height);
        }
        ctx.restore();

        // 5. 상어 처리 (생성 및 이동)
        spawnTimer++;
        if (spawnTimer > Math.max(30, 80 - gameSpeedMultiplier * 10)) {
            spawnShark();
            spawnTimer = 0;
        }

        for (let i = sharks.length - 1; i >= 0; i--) {
            let s = sharks[i];
            s.x -= s.speed;

            // 상어 수동 그리기 (여기선 임시로 상어 모양 실루엣을 그립니다)
            ctx.fillStyle = s.color;
            ctx.beginPath();
            // 상어 몸통 타원형
            ctx.ellipse(s.x + s.width/2, s.y + s.height/2, s.width/2, s.height/3, 0, 0, Math.PI * 2);
            ctx.fill();
            // 상어 꼬리 지느러미
            ctx.beginPath();
            ctx.moveTo(s.x + s.width, s.y + s.height/2);
            ctx.lineTo(s.x + s.width + 15, s.y + s.height/2 - 15);
            ctx.lineTo(s.x + s.width + 15, s.y + s.height/2 + 15);
            ctx.fill();
            // 상어 등지느러미
            ctx.beginPath();
            ctx.moveTo(s.x + s.width/2, s.y + s.height/6);
            ctx.lineTo(s.x + s.width/3, s.y - 10);
            ctx.lineTo(s.x + s.width/2 + 15, s.y + s.height/4);
            ctx.fill();
            
            // 상어 눈구멍 하나
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(s.x + 15, s.y + s.height/2 - 2, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(s.x + 14, s.y + s.height/2 - 2, 2, 0, Math.PI*2);
            ctx.fill();

            // 충돌 체크
            if (checkCollision(player, s)) {
                gameActive = false;
                finalScoreText.innerText = score;
                gameOverScreen.style.display = 'flex';
            }

            // 화면 밖으로 나간 상어 제거
            if (s.x + s.width < -50) {
                sharks.splice(i, 1);
            }
        }

        // 6. UI 점수 표시
        ctx.fillStyle = 'white';
        ctx.font = 'bold 20px Arial';
        ctx.fillText(`SCORE: ${score}`, 20, 40);

        requestAnimationFrame(animate);
    }

    // 이미지 로드가 완료되면 게임 시작 루프 실행
    fishSprite.onload = () => {
        animate();
    };
</script>
</body>
</html>
