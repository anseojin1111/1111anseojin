<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상어 피하기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#0b6fa4;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const fishImage = new Image();
fishImage.src = "fish_sprite.png";

const FRAME_WIDTH = 128;
const FRAME_HEIGHT = 128;
const FRAME_COUNT = 4;

let currentFrame = 0;
let frameTimer = 0;

let score = 0;
let gameOver = false;

const fish = {
    x: canvas.width/2,
    y: canvas.height/2,
    size: 100
};

const shark = {
    x: 100,
    y: 100,
    speed: 2.2
};

canvas.addEventListener("mousemove",(e)=>{

    fish.x += (e.clientX - fish.x) * 0.12;
    fish.y += (e.clientY - fish.y) * 0.12;

});

canvas.addEventListener("touchmove",(e)=>{

    const t = e.touches[0];

    fish.x += (t.clientX - fish.x) * 0.12;
    fish.y += (t.clientY - fish.y) * 0.12;

});

function drawBackground(){

    ctx.fillStyle = "#0b6fa4";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<40;i++){

        let x = (i*120 + performance.now()*0.05)%canvas.width;
        let y = (i*70)%canvas.height;

        ctx.beginPath();
        ctx.arc(x,y,4,0,Math.PI*2);
        ctx.strokeStyle="rgba(255,255,255,0.4)";
        ctx.stroke();
    }
}

function updateFishAnimation(){

    frameTimer++;

    if(frameTimer > 8){

        currentFrame++;
        currentFrame%=FRAME_COUNT;

        frameTimer=0;
    }
}

function drawFish(){

    const frameX = (currentFrame % 2) * FRAME_WIDTH;
    const frameY = Math.floor(currentFrame / 2) * FRAME_HEIGHT;

    ctx.drawImage(
        fishImage,
        frameX,
        frameY,
        FRAME_WIDTH,
        FRAME_HEIGHT,
        fish.x,
        fish.y,
        fish.size,
        fish.size
    );
}

function updateShark(){

    let dx = fish.x - shark.x;
    let dy = fish.y - shark.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist > 0){

        shark.x += dx/dist * shark.speed;
        shark.y += dy/dist * shark.speed;
    }
}

function drawShark(){

    const x = shark.x;
    const y = shark.y;

    ctx.save();

    if(fish.x < shark.x){

        ctx.translate(x+140,y);
        ctx.scale(-1,1);

    }else{

        ctx.translate(x,y);

    }

    ctx.fillStyle="#7f8c8d";

    ctx.fillRect(0,20,120,50);

    ctx.beginPath();
    ctx.moveTo(20,20);
    ctx.lineTo(45,-20);
    ctx.lineTo(70,20);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(120,45);
    ctx.lineTo(150,20);
    ctx.lineTo(150,70);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillRect(85,35,10,10);

    ctx.fillStyle="black";
    ctx.fillRect(88,38,4,4);

    ctx.restore();
}

function collision(){

    let dx = fish.x - shark.x;
    let dy = fish.y - shark.y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 80){

        gameOver = true;
    }
}

function drawUI(){

    ctx.fillStyle="white";
    ctx.font="30px Arial";

    ctx.fillText(
        "생존 시간 : " + Math.floor(score),
        20,
        40
    );
}

function drawGameOver(){

    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    ctx.font="60px Arial";
    ctx.fillText(
        "GAME OVER",
        canvas.width/2-180,
        canvas.height/2
    );

    ctx.font="30px Arial";
    ctx.fillText(
        "새로고침하여 다시 시작",
        canvas.width/2-140,
        canvas.height/2+60
    );
}

function gameLoop(){

    drawBackground();

    if(!gameOver){

        updateFishAnimation();
        updateShark();
        collision();

        score += 0.05;
    }

    drawFish();
    drawShark();
    drawUI();

    if(gameOver){

        drawGameOver();
    }

    requestAnimationFrame(gameLoop);
}

fishImage.onload = ()=>{

    gameLoop();
};

</script>

</body>
</html>
